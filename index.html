<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Conceit - Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/Style_1.css">
<link rel="stylesheet" href="css/font-awesome.min.css">
</head>

<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-light">
            <a href="#" class="navbar-brand">
                <img src="images/logo.png" alt="logo">
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ml-auto text-uppercase">
                    <li class="nav-item active"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Dropdown</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <div class="container-fluid p-0">
        <div id="slider" class="carousel slide" data-ride="carousel">
            <ul class="carousel-indicators">
                <li data-target="#slider" data-slide-to="0" class="active"></li>
                <li data-target="#slider" data-slide-to="1"></li>
                <li data-target="#slider" data-slide-to="2"></li>
                <li data-target="#slider" data-slide-to="3"></li>
            </ul>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="images/slider1.png" class="d-block w-100" alt="Slider 1">
                </div>
                <div class="carousel-item">
                    <img src="images/slider2.png" class="d-block w-100" alt="Slider 2">
                </div>
                <div class="carousel-item">
                    <img src="images/slider3.png" class="d-block w-100" alt="Slider 3">
                </div>
                <div class="carousel-item">
                    <img src="images/slider4.png" class="d-block w-100" alt="Slider 4">
                </div>
            </div>
            <a class="carousel-control-prev" href="#slider" role="button" data-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="sr-only">Previous</span>
            </a>
            <a class="carousel-control-next" href="#slider" role="button" data-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="sr-only">Next</span>
            </a>
        </div>
    </div>

    <div class="container">

        <div class="row mt-5">
            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 order-xl-1 order-lg-1 order-md-2 order-sm-2 order-2 about-img">
                <img src="images/img_about.png" class="img-fluid" alt="About Us Image">
            </div>
            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 order-xl-2 order-lg-2 order-md-1 order-sm-1 order-1 about-content">
            </div>
        </div>

        <div class="row mt-5 pt-4">
            <div class="col-xl-4 col-lg-4 col-md-4 col-sm-12 mb-4">
                <div class="row">
                    <div class="col-xl-2 col-lg-3 col-md-12 col-sm-12 mb-3">
                        <i class="fa fa-desktop about-icon"></i>
                    </div>
                    <div class="col-xl-10 col-lg-9 col-md-12 col-sm-12 about-service">
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-lg-4 col-md-4 col-sm-12 mb-4">
                <div class="row">
                    <div class="col-xl-2 col-lg-3 col-md-12 col-sm-12 mb-3">
                        <i class="fa fa-edit about-icon"></i>
                    </div>
                    <div class="col-xl-10 col-lg-9 col-md-12 col-sm-12 about-service">
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-lg-4 col-md-4 col-sm-12 mb-4">
                <div class="row">
                    <div class="col-xl-2 col-lg-3 col-md-12 col-sm-12 mb-3">
                        <i class="fa fa-th about-icon"></i>
                    </div>
                    <div class="col-xl-10 col-lg-9 col-md-12 col-sm-12 about-service">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery-3.5.1.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
</body>
</html>
